<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Agent System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #08090a;
      --bg-panel: #0f1011;
      --bg-surface: #191a1b;
      --bg-elevated: #28282c;
      --text-primary: #f7f8f8;
      --text-secondary: #d0d6e0;
      --text-tertiary: #8a8f98;
      --text-muted: #62666d;
      --accent: #5e6ad2;
      --accent-bright: #7170ff;
      --accent-hover: #828fff;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #eab308;
      --border: rgba(255,255,255,0.08);
      --border-subtle: rgba(255,255,255,0.05);
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font);
      font-feature-settings: 'cv01','ss03';
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== NAV ===== */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,9,10,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 20px;
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto;
      height: 52px; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .nav-logo {
      width: 26px; height: 26px; background: var(--accent);
      border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px;
    }
    .nav-title { font-size: 14px; font-weight: 510; color: var(--text-primary); letter-spacing: -0.1px; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-user {
      font-size: 13px; color: var(--text-secondary); font-weight: 510;
      display: none; align-items: center; gap: 6px;
    }
    .nav-user.active { display: flex; }
    .nav-user-dot {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: #fff;
    }
    .btn-ghost {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-secondary); border-radius: 6px; padding: 6px 12px;
      font-family: var(--font); font-size: 12px; font-weight: 510; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
    .btn-accent {
      background: var(--accent); border: none; color: #fff;
      border-radius: 6px; padding: 7px 14px;
      font-family: var(--font); font-size: 12px; font-weight: 510; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-accent:hover { background: var(--accent-hover); }

    /* ===== AUTH MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.8);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 360px; max-width: 90vw;
      padding: 28px;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal h2 {
      font-size: 18px; font-weight: 510; letter-spacing: -0.3px;
      margin-bottom: 4px;
    }
    .modal p.sub {
      font-size: 13px; color: var(--text-tertiary); margin-bottom: 20px;
    }
    .modal label {
      display: block; font-size: 12px; font-weight: 510; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .modal input[type="text"],
    .modal input[type="password"] {
      width: 100%; background: var(--bg-deep); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 12px; color: var(--text-primary);
      font-family: var(--font); font-size: 14px; outline: none; margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal .error-msg {
      font-size: 12px; color: var(--red); margin-bottom: 10px; display: none;
    }
    .modal .error-msg.active { display: block; }
    .modal-actions {
      display: flex; gap: 8px; margin-top: 6px;
    }
    .modal-actions .btn-accent { flex: 1; padding: 10px; font-size: 13px; }
    .modal-actions .btn-ghost { padding: 10px 14px; font-size: 13px; }
    .modal-switch {
      text-align: center; margin-top: 14px; font-size: 13px; color: var(--text-tertiary);
    }
    .modal-switch a {
      color: var(--accent-bright); cursor: pointer; text-decoration: none;
    }
    .modal-switch a:hover { color: var(--accent-hover); }

    /* ===== LAYOUT ===== */
    .app-layout {
      display: flex; max-width: 1200px; margin: 0 auto; min-height: calc(100vh - 52px);
    }

    /* Sidebar */
    .sidebar {
      width: 260px; flex-shrink: 0;
      border-right: 1px solid var(--border-subtle);
      padding: 16px 0;
      display: none; overflow-y: auto;
      height: calc(100vh - 52px); position: sticky; top: 52px;
    }
    .sidebar.active { display: block; }
    .sidebar-header {
      padding: 0 14px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-title {
      font-size: 11px; font-weight: 510; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .sidebar-new {
      font-size: 11px; color: var(--accent-bright); cursor: pointer;
      background: none; border: none; font-family: var(--font); font-weight: 510;
    }
    .sidebar-new:hover { color: var(--accent-hover); }
    .history-list { list-style: none; }
    .history-item {
      padding: 10px 14px; cursor: pointer; border-left: 2px solid transparent;
      transition: all 0.1s;
    }
    .history-item:hover { background: rgba(255,255,255,0.03); }
    .history-item.active {
      background: rgba(94,106,210,0.06);
      border-left-color: var(--accent);
    }
    .history-goal {
      font-size: 13px; font-weight: 510; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .history-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-muted);
    }
    .history-status {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .history-status.completed { background: var(--green); }
    .history-status.partial { background: var(--yellow); }
    .history-status.failed { background: var(--red); }
    .history-empty {
      padding: 20px 14px; font-size: 13px; color: var(--text-muted); text-align: center;
    }

    /* Main */
    .main-content {
      flex: 1; padding: 24px 28px 60px; min-width: 0;
    }

    /* ===== HERO ===== */
    .hero { text-align: center; padding: 48px 0 36px; max-width: 560px; margin: 0 auto; }
    .hero h1 {
      font-size: 36px; font-weight: 510; line-height: 1.1; letter-spacing: -0.8px;
      margin-bottom: 12px;
    }
    .hero h1 span {
      background: linear-gradient(135deg, var(--accent-bright), var(--accent-hover));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p { font-size: 15px; color: var(--text-tertiary); line-height: 1.5; }

    /* ===== INPUT ===== */
    .input-area { max-width: 560px; margin: 0 auto 36px; }
    .input-box {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 3px; transition: border-color 0.2s;
    }
    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), rgba(0,0,0,0.1) 0 4px 12px;
    }
    .input-row { display: flex; align-items: center; gap: 3px; }
    .input-prefix {
      padding: 0 4px 0 10px; font-size: 12px; font-weight: 510;
      color: var(--text-muted); font-family: var(--mono); white-space: nowrap;
    }
    input[type="text"].goal-input {
      flex: 1; background: transparent; border: none; outline: none;
      padding: 12px 6px; font-family: var(--font); font-size: 14px;
      color: var(--text-primary); letter-spacing: -0.1px;
    }
    input.goal-input::placeholder { color: var(--text-muted); }
    .run-btn {
      background: var(--accent); color: #fff; border: none; border-radius: 7px;
      padding: 9px 16px; font-family: var(--font); font-size: 13px; font-weight: 510;
      cursor: pointer; transition: all 0.15s; white-space: nowrap; margin-right: 3px;
    }
    .run-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ===== WORKFLOW ===== */
    .workflow { max-width: 560px; margin: 0 auto 36px; display: none; }
    .workflow.active { display: block; }
    .panel {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border-subtle);
    }
    .panel-header-left { display: flex; align-items: center; gap: 8px; }
    .panel-title { font-size: 12px; font-weight: 510; color: var(--text-secondary); }
    .panel-badge {
      font-size: 10px; font-weight: 500; padding: 2px 7px;
      border-radius: 9999px; border: 1px solid var(--border);
      color: var(--text-tertiary); font-family: var(--mono);
    }
    .panel-badge.running { border-color: rgba(94,106,210,0.3); color: var(--accent-bright); background: rgba(94,106,210,0.08); }
    .panel-badge.done { border-color: rgba(16,185,129,0.3); color: var(--green); background: rgba(16,185,129,0.08); }
    .panel-badge.error { border-color: rgba(239,68,68,0.3); color: var(--red); background: rgba(239,68,68,0.08); }
    .progress-track { height: 2px; background: var(--border-subtle); }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-bright));
      width: 0%; transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    .timeline { padding: 10px 16px; max-height: 280px; overflow-y: auto; }
    .timeline::-webkit-scrollbar { width: 3px; }
    .timeline::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .tl-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 5px 0; font-size: 12px; color: var(--text-tertiary);
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }
    .tl-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; margin-top: 1px; }
    .tl-icon.planning { color: var(--accent-bright); }
    .tl-icon.task { color: #38bdf8; }
    .tl-icon.success { color: var(--green); }
    .tl-icon.fail { color: var(--red); }
    .tl-icon.info { color: var(--text-muted); }
    .tl-icon.done { color: var(--green); }
    .tl-text { flex: 1; }
    .tl-time { font-family: var(--mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; }

    /* ===== RESULTS ===== */
    .results { max-width: 560px; margin: 0 auto 60px; display: none; }
    .results.active { display: block; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; margin-bottom: 16px;
    }
    .stat-card { background: var(--bg-surface); padding: 14px 16px; }
    .stat-label { font-size: 10px; font-weight: 510; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
    .stat-value { font-size: 22px; font-weight: 510; letter-spacing: -0.5px; }
    .stat-value.green { color: var(--green); }
    .stat-value.red { color: var(--red); }
    .stat-value.accent { color: var(--accent-bright); }
    .task-list { display: flex; flex-direction: column; gap: 6px; }
    .task-card {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px; transition: border-color 0.15s;
    }
    .task-card:hover { border-color: rgba(255,255,255,0.12); }
    .task-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .task-left { display: flex; align-items: center; gap: 7px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-dot.completed { background: var(--green); box-shadow: 0 0 5px rgba(16,185,129,0.4); }
    .status-dot.failed { background: var(--red); box-shadow: 0 0 5px rgba(239,68,68,0.4); }
    .task-num { font-family: var(--mono); font-size: 11px; color: var(--text-muted); background: var(--bg-deep); padding: 2px 5px; border-radius: 3px; }
    .task-name { font-size: 13px; font-weight: 510; color: var(--text-primary); }
    .task-type { font-family: var(--mono); font-size: 9px; color: var(--text-muted); background: var(--bg-deep); padding: 2px 5px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
    .task-output {
      font-size: 11px; line-height: 1.5; color: var(--text-tertiary);
      white-space: pre-wrap; word-break: break-word; max-height: 140px;
      overflow-y: auto; padding: 8px 10px; background: var(--bg-deep);
      border-radius: 5px; font-family: var(--mono);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar { display: none !important; }
      .main-content { padding: 16px; }
      .hero { padding: 32px 0 24px; }
      .hero h1 { font-size: 28px; letter-spacing: -0.6px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .input-prefix { display: none; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <div class="nav-left">
        <div class="nav-logo">🧠</div>
        <span class="nav-title">Multi-Agent System</span>
      </div>
      <div class="nav-right">
        <div class="nav-user" id="navUser">
          <div class="nav-user-dot" id="userDot">U</div>
          <span id="userName">user</span>
          <button class="btn-ghost" onclick="logout()">Logout</button>
        </div>
        <div id="authButtons">
          <button class="btn-ghost" onclick="showModal('login')">Log in</button>
          <button class="btn-accent" onclick="showModal('signup')">Sign up</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- AUTH MODAL -->
  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <h2 id="modalTitle">Sign up</h2>
      <p class="sub" id="modalSub">Create an account to save your session history.</p>
      <div class="error-msg" id="authError"></div>
      <label>Username</label>
      <input type="text" id="authUser" placeholder="e.g. garok" autocomplete="username" />
      <label>Password</label>
      <input type="password" id="authPass" placeholder="••••" autocomplete="current-password" />
      <div class="modal-actions">
        <button class="btn-accent" id="authSubmit" onclick="submitAuth()">Sign up</button>
        <button class="btn-ghost" onclick="hideModal()">Cancel</button>
      </div>
      <div class="modal-switch" id="modalSwitch">
        Already have an account? <a onclick="toggleAuthMode()">Log in</a>
      </div>
    </div>
  </div>

  <!-- APP LAYOUT -->
  <div class="app-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">History</span>
        <button class="sidebar-new" onclick="newSession()">+ New</button>
      </div>
      <ul class="history-list" id="historyList">
        <li class="history-empty">No sessions yet</li>
      </ul>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
      <section class="hero" id="heroSection">
        <h1>Build anything with <span>AI agents</span></h1>
        <p>Describe your goal. Agents plan, execute, and evaluate — autonomously.</p>
      </section>

      <section class="input-area">
        <div class="input-box">
          <div class="input-row">
            <span class="input-prefix">goal &gt;</span>
            <input type="text" class="goal-input" id="goalInput" placeholder="e.g. Build a crypto dashboard with live price charts..." />
            <button class="run-btn" id="runBtn">Run</button>
          </div>
        </div>
      </section>

      <section class="workflow" id="workflow">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-header-left">
              <span class="panel-title">Execution</span>
              <span class="panel-badge running" id="execBadge">running</span>
            </div>
            <span class="panel-title" id="execTime">0.0s</span>
          </div>
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          <div class="timeline" id="timeline"></div>
        </div>
      </section>

      <section class="results" id="results">
        <div class="stats-grid" id="statsGrid"></div>
        <div class="task-list" id="taskList"></div>
      </section>
    </main>
  </div>

<script>
// ===== STATE =====
let token = localStorage.getItem('mas_token') || null;
let username = localStorage.getItem('mas_user') || null;
let authMode = 'signup';
let abortController = null;
let currentSessionId = null;

// ===== INIT =====
checkAuth();

async function checkAuth() {
  if (!token) { showLoggedOut(); return; }
  try {
    const res = await fetch('/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) throw new Error();
    const data = await res.json();
    username = data.username;
    showLoggedIn();
    loadHistory();
  } catch {
    token = null; username = null;
    localStorage.removeItem('mas_token');
    localStorage.removeItem('mas_user');
    showLoggedOut();
  }
}

function showLoggedIn() {
  document.getElementById('authButtons').style.display = 'none';
  document.getElementById('navUser').classList.add('active');
  document.getElementById('userName').textContent = username;
  document.getElementById('userDot').textContent = username[0].toUpperCase();
  document.getElementById('sidebar').classList.add('active');
}

function showLoggedOut() {
  document.getElementById('authButtons').style.display = 'flex';
  document.getElementById('navUser').classList.remove('active');
  document.getElementById('sidebar').classList.remove('active');
}

// ===== AUTH MODAL =====
function showModal(mode) {
  authMode = mode;
  document.getElementById('authModal').classList.add('active');
  document.getElementById('authError').classList.remove('active');
  document.getElementById('authUser').value = '';
  document.getElementById('authPass').value = '';
  if (mode === 'signup') {
    document.getElementById('modalTitle').textContent = 'Sign up';
    document.getElementById('modalSub').textContent = 'Create an account to save your session history.';
    document.getElementById('authSubmit').textContent = 'Sign up';
    document.getElementById('modalSwitch').innerHTML = 'Already have an account? <a onclick="toggleAuthMode()">Log in</a>';
  } else {
    document.getElementById('modalTitle').textContent = 'Log in';
    document.getElementById('modalSub').textContent = 'Welcome back! Enter your credentials.';
    document.getElementById('authSubmit').textContent = 'Log in';
    document.getElementById('modalSwitch').innerHTML = "Don't have an account? <a onclick='toggleAuthMode()'>Sign up</a>";
  }
  setTimeout(() => document.getElementById('authUser').focus(), 100);
}

function hideModal() { document.getElementById('authModal').classList.remove('active'); }
function toggleAuthMode() { showModal(authMode === 'signup' ? 'login' : 'signup'); }

async function submitAuth() {
  const user = document.getElementById('authUser').value.trim();
  const pass = document.getElementById('authPass').value;
  const errEl = document.getElementById('authError');

  if (!user || !pass) { errEl.textContent = 'Fill in all fields'; errEl.classList.add('active'); return; }

  document.getElementById('authSubmit').disabled = true;

  try {
    const res = await fetch('/auth/' + authMode, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await res.json();

    if (!res.ok) { errEl.textContent = data.error; errEl.classList.add('active'); return; }

    token = data.token;
    username = data.username;
    localStorage.setItem('mas_token', token);
    localStorage.setItem('mas_user', username);
    hideModal();
    showLoggedIn();
    loadHistory();
  } catch (e) {
    errEl.textContent = 'Network error'; errEl.classList.add('active');
  } finally {
    document.getElementById('authSubmit').disabled = false;
  }
}

function logout() {
  token = null; username = null;
  localStorage.removeItem('mas_token');
  localStorage.removeItem('mas_user');
  showLoggedOut();
  newSession();
}

// Enter key in modal
document.getElementById('authPass').addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });
document.getElementById('authUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('authPass').focus(); });

// ===== HISTORY =====
async function loadHistory() {
  if (!token) return;
  try {
    const res = await fetch('/history', { headers: { 'Authorization': 'Bearer ' + token } });
    const data = await res.json();
    renderHistory(data.sessions || []);
  } catch {}
}

function renderHistory(sessions) {
  const list = document.getElementById('historyList');
  if (sessions.length === 0) {
    list.innerHTML = '<li class="history-empty">No sessions yet</li>';
    return;
  }
  list.innerHTML = sessions.map(s => `
    <li class="history-item ${s.id === currentSessionId ? 'active' : ''}" onclick="viewSession('${s.id}')">
      <div class="history-goal">${escHtml(s.goal)}</div>
      <div class="history-meta">
        <span class="history-status ${s.status}"></span>
        <span>${s.completed}/${s.totalTasks} tasks</span>
        <span>·</span>
        <span>${s.elapsed}</span>
      </div>
    </li>
  `).join('');
}

function newSession() {
  currentSessionId = null;
  document.getElementById('goalInput').value = '';
  document.getElementById('workflow').classList.remove('active');
  document.getElementById('results').classList.remove('active');
  document.getElementById('heroSection').style.display = '';
  document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
  document.getElementById('goalInput').focus();
}

async function viewSession(id) {
  if (!token) return;
  try {
    const res = await fetch('/history/' + id, { headers: { 'Authorization': 'Bearer ' + token } });
    const session = await res.json();
    currentSessionId = id;
    document.getElementById('heroSection').style.display = 'none';
    document.getElementById('workflow').classList.remove('active');
    renderResults(session);
    document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.history-item[onclick="viewSession('${id}')"]`)?.classList.add('active');
  } catch {}
}

async function saveToHistory(data) {
  if (!token) return;
  try {
    const res = await fetch('/history/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (result.ok) {
      currentSessionId = result.session.id;
      loadHistory();
    }
  } catch {}
}

// ===== RUN =====
const goalInput = document.getElementById('goalInput');
const runBtn = document.getElementById('runBtn');
const workflow = document.getElementById('workflow');
const timeline = document.getElementById('timeline');
const progressFill = document.getElementById('progressFill');
const execBadge = document.getElementById('execBadge');
const execTime = document.getElementById('execTime');
const results = document.getElementById('results');
const statsGrid = document.getElementById('statsGrid');
const taskList = document.getElementById('taskList');

let timerInterval = null, startTime = 0;

goalInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !runBtn.disabled) run(); });
runBtn.addEventListener('click', run);

async function run() {
  const goal = goalInput.value.trim();
  if (!goal) return;

  if (abortController) abortController.abort();
  abortController = new AbortController();

  runBtn.disabled = true; goalInput.disabled = true;
  workflow.classList.add('active'); results.classList.remove('active');
  document.getElementById('heroSection').style.display = 'none';
  timeline.innerHTML = '';
  progressFill.style.width = '0%';
  execBadge.textContent = 'running';
  execBadge.className = 'panel-badge running';

  startTime = Date.now();
  timerInterval = setInterval(() => {
    execTime.textContent = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
  }, 100);

  const completedOutputs = []; const stepResults = [];

  try {
    // Plan
    addTL('planning', '🎯', 'Planning — breaking goal into tasks...');
    const planRes = await fetch('/plan', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ goal }), signal: abortController.signal
    });
    if (!planRes.ok) throw new Error('Planning failed');
    const { tasks } = await planRes.json();
    addTL('planning', '📋', `Generated ${tasks.length} task(s)`);
    progressFill.style.width = '10%';

    // Execute each
    for (let i = 0; i < tasks.length; i++) {
      const task = tasks[i];
      addTL('task', '▶', `Task #${task.id}: ${task.task}`);
      addTL('info', '⚙', 'Executing...');

      const execRes = await fetch('/execute-task', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task, previousResults: completedOutputs }),
        signal: abortController.signal
      });

      if (!execRes.ok) {
        const err = await execRes.json().catch(() => ({}));
        addTL('fail', '✗', `Error: ${err.error || execRes.status}`);
        stepResults.push({ taskId: task.id, task: task.task, type: task.type, status: 'failed', attempts: 1, result: err.error || 'failed' });
        progressFill.style.width = (10 + ((i+1)/tasks.length)*80) + '%';
        continue;
      }

      const d = await execRes.json();
      const passed = d.success;
      const score = d.evaluation?.score || 0;
      addTL(passed ? 'success' : 'fail', passed ? '✓' : '✗', `Score: ${score}/100`);

      if (passed) completedOutputs.push({ taskId: task.id, output: d.output, artifacts: d.artifacts });

      stepResults.push({ taskId: task.id, task: task.task, type: task.type, status: passed ? 'completed' : 'failed', attempts: 1, result: (d.output || '').substring(0, 500) });
      addTL(passed ? 'success' : 'fail', passed ? '✅' : '❌', `Task #${task.id} ${passed ? 'completed' : 'failed'}`);
      progressFill.style.width = (10 + ((i+1)/tasks.length)*80) + '%';
    }

    // Summary
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
    const failed = stepResults.filter(s => s.status === 'failed').length;
    const status = failed === 0 ? 'completed' : failed < stepResults.length ? 'partial' : 'failed';
    progressFill.style.width = '100%';
    addTL('done', '🏁', `Done in ${elapsed}`);

    const resultData = {
      goal, status, totalTasks: stepResults.length,
      completed: stepResults.filter(s => s.status === 'completed').length,
      failed, elapsed, steps: stepResults
    };

    renderResults(resultData);
    execBadge.textContent = status;
    execBadge.className = 'panel-badge ' + (status === 'completed' ? 'done' : 'error');
    execTime.textContent = elapsed;

    // Auto-save if logged in
    saveToHistory(resultData);

  } catch (err) {
    if (err.name === 'AbortError') { addTL('info', '⏹', 'Cancelled'); }
    else { addTL('fail', '💥', 'Error: ' + err.message); }
    execBadge.textContent = 'error';
    execBadge.className = 'panel-badge error';
  } finally {
    clearInterval(timerInterval);
    runBtn.disabled = false; goalInput.disabled = false;
    abortController = null;
  }
}

function addTL(cls, icon, text, time) {
  const div = document.createElement('div');
  div.className = 'tl-item';
  div.innerHTML = `<span class="tl-icon ${cls}">${icon}</span><span class="tl-text">${escHtml(text)}</span>${time ? `<span class="tl-time">${time}</span>` : ''}`;
  timeline.appendChild(div);
  timeline.scrollTop = timeline.scrollHeight;
}

function renderResults(data) {
  results.classList.add('active');
  statsGrid.innerHTML = `
    <div class="stat-card"><div class="stat-label">Tasks</div><div class="stat-value">${data.totalTasks||0}</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value green">${data.completed||0}</div></div>
    <div class="stat-card"><div class="stat-label">Failed</div><div class="stat-value red">${data.failed||0}</div></div>
    <div class="stat-card"><div class="stat-label">Time</div><div class="stat-value accent">${data.elapsed||'—'}</div></div>
  `;
  taskList.innerHTML = '';
  for (const s of (data.steps || [])) {
    const card = document.createElement('div');
    card.className = 'task-card';
    card.innerHTML = `
      <div class="task-top">
        <div class="task-left"><span class="status-dot ${s.status}"></span><span class="task-num">#${s.taskId}</span><span class="task-name">${escHtml(s.task)}</span></div>
        <span class="task-type">${s.type}</span>
      </div>
      <div class="task-output">${escHtml(s.result || 'No output')}</div>
    `;
    taskList.appendChild(card);
  }
}

function escHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
</script>
