<script>
// ===== STATE =====
let token = localStorage.getItem('mas_token') || null;
let localUser = localStorage.getItem('mas_user') || null;
let localHistory = JSON.parse(localStorage.getItem('mas_history') || '[]');
let authMode = 'signup';
let abortController = null;
let currentSessionId = null;

// ===== INIT =====
init();

async function init() {
  if (token) {
    try {
      const res = await fetch('/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) throw new Error();
      const data = await res.json();
      localUser = data.username;
      localStorage.setItem('mas_user', localUser);
      showLoggedIn();
      // Sync localStorage history to server
      syncHistoryToServer();
    } catch {
      // Token expired (cold start), but keep localStorage data
      // Re-auth silently by re-logging in isn't possible without password
      // Just show logged-in state from localStorage
      if (localUser) {
        showLoggedIn();
      } else {
        token = null;
        localStorage.removeItem('mas_token');
        showLoggedOut();
      }
    }
  } else if (localUser) {
    // Have username in localStorage but no token (cold start)
    showLoggedIn();
  } else {
    showLoggedOut();
  }
  renderHistoryFromLocal();
}

function showLoggedIn() {
  document.getElementById('authButtons').style.display = 'none';
  document.getElementById('navUser').classList.add('active');
  document.getElementById('userName').textContent = localUser;
  document.getElementById('userDot').textContent = localUser[0].toUpperCase();
  document.getElementById('sidebar').classList.add('active');
}

function showLoggedOut() {
  document.getElementById('authButtons').style.display = 'flex';
  document.getElementById('navUser').classList.remove('active');
  document.getElementById('sidebar').classList.remove('active');
}

// ===== AUTH MODAL =====
function showModal(mode) {
  authMode = mode;
  document.getElementById('authModal').classList.add('active');
  document.getElementById('authError').classList.remove('active');
  document.getElementById('authUser').value = '';
  document.getElementById('authPass').value = '';
  if (mode === 'signup') {
    document.getElementById('modalTitle').textContent = 'Sign up';
    document.getElementById('modalSub').textContent = 'Create an account to save your session history.';
    document.getElementById('authSubmit').textContent = 'Sign up';
    document.getElementById('modalSwitch').innerHTML = 'Already have an account? <a onclick="toggleAuthMode()">Log in</a>';
  } else {
    document.getElementById('modalTitle').textContent = 'Log in';
    document.getElementById('modalSub').textContent = 'Welcome back! Enter your credentials.';
    document.getElementById('authSubmit').textContent = 'Log in';
    document.getElementById('modalSwitch').innerHTML = "Don't have an account? <a onclick='toggleAuthMode()'>Sign up</a>";
  }
  setTimeout(() => document.getElementById('authUser').focus(), 100);
}

function hideModal() { document.getElementById('authModal').classList.remove('active'); }
function toggleAuthMode() { showModal(authMode === 'signup' ? 'login' : 'signup'); }

async function submitAuth() {
  const user = document.getElementById('authUser').value.trim();
  const pass = document.getElementById('authPass').value;
  const errEl = document.getElementById('authError');

  if (!user || !pass) { errEl.textContent = 'Fill in all fields'; errEl.classList.add('active'); return; }

  document.getElementById('authSubmit').disabled = true;

  try {
    const res = await fetch('/auth/' + authMode, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await res.json();

    if (!res.ok) { errEl.textContent = data.error; errEl.classList.add('active'); return; }

    token = data.token;
    localUser = data.username;
    localStorage.setItem('mas_token', token);
    localStorage.setItem('mas_user', localUser);
    hideModal();
    showLoggedIn();
    // Sync history after login
    syncHistoryToServer();
  } catch (e) {
    errEl.textContent = 'Network error'; errEl.classList.add('active');
  } finally {
    document.getElementById('authSubmit').disabled = false;
  }
}

function logout() {
  token = null; localUser = null;
  localStorage.removeItem('mas_token');
  localStorage.removeItem('mas_user');
  // Keep history in localStorage
  showLoggedOut();
  newSession();
}

document.getElementById('authPass').addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });
document.getElementById('authUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('authPass').focus(); });

// ===== HISTORY (localStorage-first) =====
function saveToHistoryLocal(data) {
  const session = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    ...data,
    createdAt: new Date().toISOString()
  };
  localHistory.unshift(session);
  if (localHistory.length > 50) localHistory = localHistory.slice(0, 50);
  localStorage.setItem('mas_history', JSON.stringify(localHistory));
  currentSessionId = session.id;
  renderHistoryFromLocal();

  // Also save to server if authenticated
  if (token) {
    fetch('/history/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(data)
    }).catch(() => {});
  }
}

function renderHistoryFromLocal() {
  const list = document.getElementById('historyList');
  if (localHistory.length === 0) {
    list.innerHTML = '<li class="history-empty">No sessions yet</li>';
    return;
  }
  list.innerHTML = localHistory.map(s => `
    <li class="history-item ${s.id === currentSessionId ? 'active' : ''}" onclick="viewSession('${s.id}')">
      <div class="history-goal">${escHtml(s.goal)}</div>
      <div class="history-meta">
        <span class="history-status ${s.status}"></span>
        <span>${s.completed}/${s.totalTasks} tasks</span>
        <span>·</span>
        <span>${s.elapsed}</span>
      </div>
    </li>
  `).join('');
}

function viewSession(id) {
  const session = localHistory.find(s => s.id === id);
  if (!session) return;
  currentSessionId = id;
  document.getElementById('heroSection').style.display = 'none';
  document.getElementById('workflow').classList.remove('active');
  renderResults(session);
  document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`.history-item[onclick="viewSession('${id}')"]`);
  if (item) item.classList.add('active');
}

async function syncHistoryToServer() {
  if (!token) return;
  try {
    await fetch('/auth/sync-history', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ sessions: localHistory })
    });
  } catch {}
}

function newSession() {
  currentSessionId = null;
  document.getElementById('goalInput').value = '';
  document.getElementById('workflow').classList.remove('active');
  document.getElementById('results').classList.remove('active');
  document.getElementById('heroSection').style.display = '';
  document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
  document.getElementById('goalInput').focus();
}

// ===== RUN =====
const goalInput = document.getElementById('goalInput');
const runBtn = document.getElementById('runBtn');
const workflow = document.getElementById('workflow');
const timeline = document.getElementById('timeline');
const progressFill = document.getElementById('progressFill');
const execBadge = document.getElementById('execBadge');
const execTime = document.getElementById('execTime');
const results = document.getElementById('results');
const statsGrid = document.getElementById('statsGrid');
const taskList = document.getElementById('taskList');

let timerInterval = null, startTime = 0;

goalInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !runBtn.disabled) run(); });
runBtn.addEventListener('click', run);

async function run() {
  const goal = goalInput.value.trim();
  if (!goal) return;

  if (abortController) abortController.abort();
  abortController = new AbortController();

  runBtn.disabled = true; goalInput.disabled = true;
  workflow.classList.add('active'); results.classList.remove('active');
  document.getElementById('heroSection').style.display = 'none';
  timeline.innerHTML = '';
  progressFill.style.width = '0%';
  execBadge.textContent = 'running';
  execBadge.className = 'panel-badge running';

  startTime = Date.now();
  timerInterval = setInterval(() => {
    execTime.textContent = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
  }, 100);

  const completedOutputs = []; const stepResults = [];

  try {
    addTL('planning', '🎯', 'Planning — breaking goal into tasks...');
    const planRes = await fetch('/plan', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ goal }), signal: abortController.signal
    });
    if (!planRes.ok) throw new Error('Planning failed');
    const { tasks } = await planRes.json();
    addTL('planning', '📋', `Generated ${tasks.length} task(s)`);
    progressFill.style.width = '10%';

    for (let i = 0; i < tasks.length; i++) {
      const task = tasks[i];
      addTL('task', '▶', `Task #${task.id}: ${task.task}`);
      addTL('info', '⚙', 'Executing...');

      const execRes = await fetch('/execute-task', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task, previousResults: completedOutputs }),
        signal: abortController.signal
      });

      if (!execRes.ok) {
        const err = await execRes.json().catch(() => ({}));
        addTL('fail', '✗', `Error: ${err.error || execRes.status}`);
        stepResults.push({ taskId: task.id, task: task.task, type: task.type, status: 'failed', attempts: 1, result: err.error || 'failed' });
        progressFill.style.width = (10 + ((i+1)/tasks.length)*80) + '%';
        continue;
      }

      const d = await execRes.json();
      const passed = d.success;
      const score = d.evaluation?.score || 0;
      addTL(passed ? 'success' : 'fail', passed ? '✓' : '✗', `Score: ${score}/100`);

      if (passed) completedOutputs.push({ taskId: task.id, output: d.output, artifacts: d.artifacts });

      stepResults.push({ taskId: task.id, task: task.task, type: task.type, status: passed ? 'completed' : 'failed', attempts: 1, result: (d.output || '').substring(0, 500) });
      addTL(passed ? 'success' : 'fail', passed ? '✅' : '❌', `Task #${task.id} ${passed ? 'completed' : 'failed'}`);
      progressFill.style.width = (10 + ((i+1)/tasks.length)*80) + '%';
    }

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
    const failed = stepResults.filter(s => s.status === 'failed').length;
    const status = failed === 0 ? 'completed' : failed < stepResults.length ? 'partial' : 'failed';
    progressFill.style.width = '100%';
    addTL('done', '🏁', `Done in ${elapsed}`);

    const resultData = {
      goal, status, totalTasks: stepResults.length,
      completed: stepResults.filter(s => s.status === 'completed').length,
      failed, elapsed, steps: stepResults
    };

    renderResults(resultData);
    execBadge.textContent = status;
    execBadge.className = 'panel-badge ' + (status === 'completed' ? 'done' : 'error');
    execTime.textContent = elapsed;

    // Auto-save to localStorage + server
    saveToHistoryLocal(resultData);

  } catch (err) {
    if (err.name === 'AbortError') { addTL('info', '⏹', 'Cancelled'); }
    else { addTL('fail', '💥', 'Error: ' + err.message); }
    execBadge.textContent = 'error';
    execBadge.className = 'panel-badge error';
  } finally {
    clearInterval(timerInterval);
    runBtn.disabled = false; goalInput.disabled = false;
    abortController = null;
  }
}

function addTL(cls, icon, text) {
  const div = document.createElement('div');
  div.className = 'tl-item';
  div.innerHTML = `<span class="tl-icon ${cls}">${icon}</span><span class="tl-text">${escHtml(text)}</span>`;
  timeline.appendChild(div);
  timeline.scrollTop = timeline.scrollHeight;
}

function renderResults(data) {
  results.classList.add('active');
  statsGrid.innerHTML = `
    <div class="stat-card"><div class="stat-label">Tasks</div><div class="stat-value">${data.totalTasks||0}</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value green">${data.completed||0}</div></div>
    <div class="stat-card"><div class="stat-label">Failed</div><div class="stat-value red">${data.failed||0}</div></div>
    <div class="stat-card"><div class="stat-label">Time</div><div class="stat-value accent">${data.elapsed||'—'}</div></div>
  `;
  taskList.innerHTML = '';
  for (const s of (data.steps || [])) {
    const card = document.createElement('div');
    card.className = 'task-card';
    card.innerHTML = `
      <div class="task-top">
        <div class="task-left"><span class="status-dot ${s.status}"></span><span class="task-num">#${s.taskId}</span><span class="task-name">${escHtml(s.task)}</span></div>
        <span class="task-type">${s.type}</span>
      </div>
      <div class="task-output">${escHtml(s.result || 'No output')}</div>
    `;
    taskList.appendChild(card);
  }
}

function escHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
</script>
</body>
</html>
