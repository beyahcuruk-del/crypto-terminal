<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Agent System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #08090a;
      --bg-panel: #0f1011;
      --bg-surface: #191a1b;
      --bg-elevated: #28282c;
      --text-primary: #f7f8f8;
      --text-secondary: #d0d6e0;
      --text-tertiary: #8a8f98;
      --text-muted: #62666d;
      --accent: #5e6ad2;
      --accent-bright: #7170ff;
      --accent-hover: #828fff;
      --green: #10b981;
      --green-dim: #27a644;
      --red: #ef4444;
      --yellow: #eab308;
      --border: rgba(255,255,255,0.08);
      --border-subtle: rgba(255,255,255,0.05);
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    }

    html { font-size: 16px; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font);
      font-feature-settings: 'cv01', 'ss03';
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== NAV ===== */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,9,10,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 24px;
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .nav-title {
      font-size: 14px;
      font-weight: 510;
      color: var(--text-primary);
      letter-spacing: -0.1px;
    }

    .nav-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .nav-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
    }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      padding: 80px 24px 48px;
      max-width: 680px;
      margin: 0 auto;
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 510;
      line-height: 1.0;
      letter-spacing: -1.056px;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .hero h1 span {
      background: linear-gradient(135deg, var(--accent-bright), var(--accent-hover));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-tertiary);
      letter-spacing: -0.165px;
    }

    /* ===== INPUT ===== */
    .input-area {
      max-width: 680px;
      margin: 0 auto 48px;
      padding: 0 24px;
    }

    .input-box {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      transition: border-color 0.2s;
    }

    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), rgba(0,0,0,0.1) 0px 4px 12px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .input-prefix {
      padding: 0 4px 0 12px;
      font-size: 13px;
      font-weight: 510;
      color: var(--text-muted);
      font-family: var(--mono);
      white-space: nowrap;
    }

    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 14px 8px;
      font-family: var(--font);
      font-feature-settings: 'cv01', 'ss03';
      font-size: 15px;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.165px;
    }

    input::placeholder { color: var(--text-muted); }

    .run-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-family: var(--font);
      font-feature-settings: 'cv01', 'ss03';
      font-size: 14px;
      font-weight: 510;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      margin-right: 4px;
    }

    .run-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .run-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .run-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    /* ===== WORKFLOW PANEL ===== */
    .workflow {
      max-width: 680px;
      margin: 0 auto 48px;
      padding: 0 24px;
      display: none;
    }

    .workflow.active { display: block; }

    .panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .panel-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 510;
      color: var(--text-secondary);
      letter-spacing: -0.13px;
    }

    .panel-badge {
      font-size: 11px;
      font-weight: 510;
      padding: 2px 8px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      color: var(--text-tertiary);
      font-family: var(--mono);
    }

    .panel-badge.running {
      border-color: rgba(94,106,210,0.3);
      color: var(--accent-bright);
      background: rgba(94,106,210,0.08);
    }

    .panel-badge.done {
      border-color: rgba(16,185,129,0.3);
      color: var(--green);
      background: rgba(16,185,129,0.08);
    }

    .panel-badge.error {
      border-color: rgba(239,68,68,0.3);
      color: var(--red);
      background: rgba(239,68,68,0.08);
    }

    /* Progress bar */
    .progress-track {
      height: 2px;
      background: var(--border-subtle);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-bright));
      width: 0%;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Timeline */
    .timeline {
      padding: 12px 18px;
      max-height: 320px;
      overflow-y: auto;
    }

    .timeline::-webkit-scrollbar { width: 4px; }
    .timeline::-webkit-scrollbar-track { background: transparent; }
    .timeline::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .tl-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 0;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-tertiary);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tl-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .tl-icon.planning { color: var(--accent-bright); }
    .tl-icon.task { color: #38bdf8; }
    .tl-icon.success { color: var(--green); }
    .tl-icon.fail { color: var(--red); }
    .tl-icon.info { color: var(--text-muted); }
    .tl-icon.done { color: var(--green); }

    .tl-text { flex: 1; }

    .tl-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ===== RESULTS ===== */
    .results {
      max-width: 680px;
      margin: 0 auto 80px;
      padding: 0 24px;
      display: none;
    }

    .results.active { display: block; }

    /* Stats row */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--bg-surface);
      padding: 16px 18px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 510;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 510;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .stat-value.green { color: var(--green); }
    .stat-value.red { color: var(--red); }
    .stat-value.accent { color: var(--accent-bright); }

    /* Task cards */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      transition: border-color 0.15s;
    }

    .task-card:hover {
      border-color: rgba(255,255,255,0.12);
    }

    .task-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .task-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-num {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-deep);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .task-name {
      font-size: 14px;
      font-weight: 510;
      color: var(--text-primary);
      letter-spacing: -0.1px;
    }

    .task-type {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-deep);
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .task-output {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-tertiary);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 180px;
      overflow-y: auto;
      padding: 10px 12px;
      background: var(--bg-deep);
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 12px;
    }

    .task-output::-webkit-scrollbar { width: 4px; }
    .task-output::-webkit-scrollbar-track { background: transparent; }
    .task-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-dot.completed { background: var(--green); box-shadow: 0 0 6px rgba(16,185,129,0.4); }
    .status-dot.failed { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.4); }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border-subtle);
    }

    footer a {
      color: var(--accent-bright);
      text-decoration: none;
    }

    footer a:hover { color: var(--accent-hover); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .hero { padding: 48px 16px 32px; }
      .hero h1 { font-size: 32px; letter-spacing: -0.704px; }
      .hero p { font-size: 15px; }
      .input-area, .workflow, .results { padding: 0 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .input-prefix { display: none; }
      .nav-status span { display: none; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <div class="nav-brand">
        <div class="nav-logo">🧠</div>
        <span class="nav-title">Multi-Agent System</span>
      </div>
      <div class="nav-status">
        <div class="nav-dot"></div>
        <span>Powered by MiMo</span>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>Build anything with <span>AI agents</span></h1>
    <p>Describe your goal. Agents plan, execute, and evaluate — autonomously.</p>
  </section>

  <!-- INPUT -->
  <section class="input-area">
    <div class="input-box" id="inputBox">
      <div class="input-row">
        <span class="input-prefix">goal &gt;</span>
        <input type="text" id="goalInput" placeholder="e.g. Build a crypto dashboard with live price charts..." />
        <button class="run-btn" id="runBtn">Run</button>
      </div>
    </div>
  </section>

  <!-- WORKFLOW -->
  <section class="workflow" id="workflow">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-header-left">
          <span class="panel-title">Execution</span>
          <span class="panel-badge running" id="execBadge">running</span>
        </div>
        <span class="panel-title" id="execTime">0.0s</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>

  <!-- RESULTS -->
  <section class="results" id="results">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="task-list" id="taskList"></div>
  </section>

  <!-- FOOTER -->
  <footer>
    Multi-Agent System &mdash; <a href="https://github.com/beyahcuruk-del/multi-agent-system">GitHub</a>
  </footer>

<script>
const goalInput = document.getElementById('goalInput');
const runBtn = document.getElementById('runBtn');
const workflow = document.getElementById('workflow');
const timeline = document.getElementById('timeline');
const progressFill = document.getElementById('progressFill');
const execBadge = document.getElementById('execBadge');
const execTime = document.getElementById('execTime');
const results = document.getElementById('results');
const statsGrid = document.getElementById('statsGrid');
const taskList = document.getElementById('taskList');

let timerInterval = null;
let startTime = 0;

goalInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !runBtn.disabled) run();
});

runBtn.addEventListener('click', run);

async function run() {
  const goal = goalInput.value.trim();
  if (!goal) return;

  // Reset
  runBtn.disabled = true;
  goalInput.disabled = true;
  workflow.classList.add('active');
  results.classList.remove('active');
  timeline.innerHTML = '';
  progressFill.style.width = '0%';
  execBadge.textContent = 'running';
  execBadge.className = 'panel-badge running';

  startTime = Date.now();
  timerInterval = setInterval(() => {
    execTime.textContent = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
  }, 100);

  addTimeline('info', '⏳', 'Sending to agents...');

  try {
    const res = await fetch('/run-task', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ goal })
    });
    const data = await res.json();

    clearInterval(timerInterval);
    execTime.textContent = data.elapsed || '—';

    if (data.logs) data.logs.forEach(processLog);
    renderResults(data);

    execBadge.textContent = data.status;
    execBadge.className = 'panel-badge ' + (data.status === 'completed' ? 'done' : 'error');
    progressFill.style.width = '100%';

  } catch (err) {
    clearInterval(timerInterval);
    addTimeline('fail', '💥', 'Error: ' + err.message);
    execBadge.textContent = 'error';
    execBadge.className = 'panel-badge error';
  } finally {
    runBtn.disabled = false;
    goalInput.disabled = false;
  }
}

function processLog(log) {
  const e = log.event;
  const d = log.data;
  const t = ((new Date(log.timestamp) - startTime) / 1000).toFixed(1) + 's';

  if (e === 'planning') {
    addTimeline('planning', '🎯', 'Planning — breaking goal into tasks...', t);
  } else if (e === 'planned') {
    addTimeline('planning', '📋', `Generated ${d.taskCount} task(s)`, t);
    progressFill.style.width = '10%';
  } else if (e === 'task_start') {
    addTimeline('task', '▶', `Task #${d.taskId}: ${d.task}`, t);
  } else if (e === 'attempt') {
    addTimeline('info', '⚙', `Attempt ${d.attempt}...`, t);
  } else if (e === 'attempt_result') {
    const icon = d.success ? '✓' : '✗';
    const cls = d.success ? 'success' : 'fail';
    addTimeline(cls, icon, `Score: ${d.score}/100`, t);
  } else if (e === 'task_done') {
    const icon = d.status === 'completed' ? '✅' : '❌';
    const cls = d.status === 'completed' ? 'success' : 'fail';
    addTimeline(cls, icon, `Task #${d.taskId} ${d.status}`, t);
  } else if (e === 'session_end') {
    addTimeline('done', '🏁', `Completed in ${d.elapsed}`, t);
  } else if (e === 'fatal_error') {
    addTimeline('fail', '💥', d.error, t);
  }
}

function addTimeline(cls, icon, text, time) {
  const div = document.createElement('div');
  div.className = 'tl-item';
  div.innerHTML = `
    <span class="tl-icon ${cls}">${icon}</span>
    <span class="tl-text">${escHtml(text)}</span>
    ${time ? `<span class="tl-time">${time}</span>` : ''}
  `;
  timeline.appendChild(div);
  timeline.scrollTop = timeline.scrollHeight;
}

function renderResults(data) {
  results.classList.add('active');

  statsGrid.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Tasks</div>
      <div class="stat-value">${data.totalTasks || 0}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Completed</div>
      <div class="stat-value green">${data.completed || 0}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Failed</div>
      <div class="stat-value red">${data.failed || 0}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Time</div>
      <div class="stat-value accent">${data.elapsed || '—'}</div>
    </div>
  `;

  taskList.innerHTML = '';
  for (const s of (data.steps || [])) {
    const card = document.createElement('div');
    card.className = 'task-card';
    card.innerHTML = `
      <div class="task-top">
        <div class="task-left">
          <span class="status-dot ${s.status}"></span>
          <span class="task-num">#${s.taskId}</span>
          <span class="task-name">${escHtml(s.task)}</span>
        </div>
        <span class="task-type">${s.type}</span>
      </div>
      <div class="task-output">${escHtml(s.result || 'No output')}</div>
    `;
    taskList.appendChild(card);
  }
}

function escHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}
</script>
</body>
</html>
